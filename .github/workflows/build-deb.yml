  name: Build .deb Package

  on:
    push:
      tags:
        - 'v*'
    workflow_dispatch:

  jobs:
    build-deb:
      runs-on: ubuntu-22.04

      steps:
        - name: Checkout source
          uses: actions/checkout@v4

        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build
  g++

        - name: Configure and build
          run: |
            cmake -S . -B build -G Ninja
  -DCMAKE_BUILD_TYPE=Release
            cmake --build build

        - name: Get version from tag
          id: version
          run: |
            VERSION="${GITHUB_REF_NAME#v}"
            if [ -z "$VERSION" ] || [ "$VERSION" =
  "$GITHUB_REF_NAME" ]; then
              VERSION="0.1.0"
            fi
            echo "version=$VERSION" >>
  "$GITHUB_OUTPUT"

        - name: Package .deb
          run: |
            PKG_DIR="cppx_${{
  steps.version.outputs.version }}_amd64"
            mkdir -p "$PKG_DIR/DEBIAN"
            mkdir -p "$PKG_DIR/usr/local/bin"

            cp build/cppx "$PKG_DIR/usr/local/bin/"
            strip "$PKG_DIR/usr/local/bin/cppx"

            cat > "$PKG_DIR/DEBIAN/control" << EOF
            Package: cppx
            Version: ${{ steps.version.outputs.version
   }}
            Section: devel
            Priority: optional
            Architecture: amd64
            Depends: cmake (>= 3.20), g++ (>= 12)
            Maintainer: Your Name <you@example.com>
            Description: A Cargo-inspired CLI tool for
   C++ project management
             cppx helps developers quickly bootstrap
  and manage modern C++ projects.
            EOF

            dpkg-deb --build "$PKG_DIR"

        - name: Upload .deb artifact
          uses: actions/upload-artifact@v4
          with:
            name: cppx-deb
            path: "*.deb"

        - name: Create GitHub Release
          if: startsWith(github.ref, 'refs/tags/')
          uses: softprops/action-gh-release@v2
          with:
            files: "*.deb"
